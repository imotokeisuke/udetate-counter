<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Push-up Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="app-container">
        <header>
            <h1><i class="fa-solid fa-dumbbell"></i> Push-up Tracker</h1>
            <p class="subtitle">毎日の努力を可視化しよう</p>
        </header>

        <main>
            <section class="dashboard">
                <div class="stat-card">
                    <h3>今月の合計</h3>
                    <div class="stat-value"><span id="monthly-total">0</span> <span class="unit">回</span></div>
                </div>
            </section>

            <section class="input-section">
                <h2>記録を追加</h2>
                <form id="pushup-form">
                    <div class="form-group">
                        <label for="date-input">日付</label>
                        <input type="date" id="date-input" required>
                    </div>
                    <div class="form-group">
                        <label for="count-input">回数</label>
                        <input type="number" id="count-input" min="1" max="1000" placeholder="0" required>
                    </div>
                    <button type="submit" class="btn-primary">記録する <i class="fa-solid fa-plus"></i></button>
                </form>
            </section>

            <section class="history-section">
                <div class="history-header">
                    <h2>記録履歴</h2>
                    <select id="month-filter">
                        <!-- Options will be populated by JS -->
                    </select>
                </div>
                <div class="history-list" id="history-list">
                    <!-- History items will be inserted here -->
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
